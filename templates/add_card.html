<div class="modal fade" id="addCardModal" tabindex="-1" aria-labelledby="addCardModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content rounded-4 border-0 shadow-lg">
            <form method="POST" action="{% url 'add_card' %}">
                {% csrf_token %}
                <!-- Soft success header to match the "Add" theme -->
                <div class="modal-header bg-success bg-opacity-10 border-bottom-0 rounded-top-4 pb-2">
                    <h5 class="modal-title fw-bold text-success" id="addCardModalLabel">
                        <i class="bi bi-folder-plus me-2"></i>Add New Record
                    </h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body px-4 pt-4">
                    <div class="mb-3">
                        <label for="cardName" class="form-label fw-medium text-secondary">Record Name</label>
                        <!-- Larger input for mobile typing with a helpful placeholder -->
                        <input type="text" name="name" class="form-control form-control-lg rounded-3 fs-6 shadow-none" id="cardName" placeholder="e.g., Monthly Groceries" required>
                    </div>
                </div>
                
                <div class="modal-footer border-top-0 pt-0 px-4 pb-4">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success rounded-pill px-4 fw-medium shadow-sm">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>
