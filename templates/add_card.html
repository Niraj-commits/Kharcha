<div class="modal fade" id="addCardModal" tabindex="-1" aria-labelledby="addCardModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-sm">
      <div class="modal-content">
          <form method="POST" action="{% url 'add_card' %}">
              {% csrf_token %}
              <div class="modal-header bg-light">
                  <h5 class="modal-title" id="addCardModalLabel">Add New Record</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                  <div class="mb-3">
                      <label for="cardName" class="form-label">Record Name</label>
                      <input type="text" name="name" class="form-control" id="cardName" required>
                  </div>
              </div>
              <div class="modal-footer">
                  <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary btn-sm">Create</button>
              </div>
          </form>
      </div>
  </div>
</div>
