{% extends "base.html" %}

{% block title %} Edit Entry {% endblock title %}

{% block body %}
<div class="container mt-5">
    <h2 class="mb-4">Edit Entry</h2>
    <form action="{% url 'edit_details' card_details.id task.id %}" method="post" class="needs-validation" novalidate>
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input 
                type="text" 
                class="form-control" 
                id="title" 
                name="title" 
                value="{{ task.title }}" 
                required>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <input 
                type="text" 
                class="form-control" 
                id="description" 
                name="description" 
                value="{{ task.description }}" 
                required>
        </div>

        <div class="mb-3">
            <label for="amount" class="form-label">Amount</label>
            <input 
                type="number" 
                class="form-control" 
                id="amount" 
                name="amount" 
                value="{{ task.amount }}" 
                required>
        </div>

        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>
{% endblock body %}
