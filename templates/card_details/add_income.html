<div class="modal fade" id="addIncomeModal" tabindex="-1" aria-labelledby="addIncomeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow-lg">
            <form method="POST" action="{% url 'add_income' card_details.id %}">
                {% csrf_token %}
                
                <!-- Soft success header for income -->
                <div class="modal-header bg-success bg-opacity-10 border-bottom-0 rounded-top-4 pb-2">
                    <h5 class="modal-title fw-bold text-success" id="addIncomeModalLabel">
                        <i class="bi bi-plus-circle-fill me-2"></i>Add Income
                    </h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body px-4 pt-4">
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Title</label>
                        <input type="text" class="form-control form-control-lg rounded-3 fs-6 shadow-none" name="title" required placeholder="e.g., Salary, Freelance...">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Description</label>
                        <input type="text" class="form-control form-control-lg rounded-3 fs-6 shadow-none" name="description" placeholder="Short Description...">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Amount</label>
                        <!-- Currency input group -->
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-light border-end-0 rounded-start-3 text-muted fw-medium">Rs.</span>
                            <input type="number" class="form-control form-control-lg rounded-end-3 border-start-0 fs-6 shadow-none" name="amount" required placeholder="0.00">
                        </div>
                    </div>
                </div>
                
                <div class="modal-footer border-top-0 pt-0 px-4 pb-4">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <!-- Changed to btn-success to match the income theme -->
                    <button type="submit" class="btn btn-success rounded-pill px-4 fw-medium shadow-sm">Add Income</button>
                </div>
            </form>
        </div>
    </div>
</div>
