{% extends "base.html" %}

{% block title %}Add Income{% endblock title %}

{% block body %}
<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Add Income</h4>
    </div>
    <div class="card-body">
      <form action="{% url 'add_income' card_details.id %}" method="post">
        {% csrf_token %}
        
        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input type="text" name="title" id="title" class="form-control" placeholder="e.g. Salary">
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <input type="text" name="description" id="description" class="form-control" placeholder="Optional notes">
        </div>

        <div class="mb-3">
          <label for="amount" class="form-label">Amount</label>
          <input type="number" name="amount" id="amount" class="form-control" placeholder="e.g. 1000">
        </div>

        <div class="text-end">
          <button type="submit" class="btn btn-success">Submit</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock body %}
