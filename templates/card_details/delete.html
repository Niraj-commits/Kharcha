<div class="modal fade" id="deleteModal{{ expense.id }}" tabindex="-1" aria-labelledby="deleteModalLabel{{ expense.id }}" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content rounded-4 border-0 shadow-lg">
            <form method="POST" action="{% url 'delete_details' card_details.id expense.id %}">
                {% csrf_token %}
                
                <!-- Soft danger header -->
                <div class="modal-header bg-danger bg-opacity-10 border-bottom-0 rounded-top-4 pb-2">
                    <h5 class="modal-title fw-bold text-danger" id="deleteModalLabel{{ expense.id }}">Confirm Delete</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <!-- Centered body with a warning icon -->
                <div class="modal-body px-4 text-center">
                    <div class="mb-3 text-danger">
                        <i class="bi bi-exclamation-circle fs-1"></i>
                    </div>
                    <p class="mb-0 fs-6">Are you sure you want to delete <br><strong class="text-dark">"{{ expense.title }}"</strong>?</p>
                </div>
                
                <!-- Centered pill buttons -->
                <div class="modal-footer border-top-0 pt-0 px-4 pb-4 justify-content-center">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger rounded-pill px-4 fw-medium shadow-sm">Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>
