{% extends "base.html" %}

{% block title %}Your Cards{% endblock %}

{% block body %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Your Records</h2>
        <form class="d-flex align-items-center" method="get" action="{% url 'home' %}">
            <div class="col-md-6 d-flex align-items-center me-2">  <label for="search" class="me-2 fw-semibold mb-0">Search:</label>
                <input type="text" id="search" name="search" class="form-control flex-grow-1" placeholder="Search..."
                    value="{{ request.GET.search|default:'' }}">
            </div>
            <a href="{% url 'home' %}" class="btn btn-secondary">Clear</a>
        </form>
    </div>

    <div class="row g-4">
        {% for card in cards %}
        <div class="col-md-4">
          <div class="card h-100 shadow-sm border-2">
              <div class="card-body d-flex flex-column">
                  <h5 class="card-title">{{ card.name }}</h5>
                  <div class="mt-3 d-flex justify-content-between">
                      <a href="{% url 'view_details' card.id %}" class="btn btn-primary btn-sm flex-grow-1 me-1">View</a>
                  </div>
                  <!-- <div class="mt-3 d-flex justify-content-between">
                    <a href="#" class="btn btn-warning btn-sm flex-grow-1 me-1">Edit</a>
                    <a href="#" class="btn btn-danger btn-sm flex-grow-1">Delete</a>
                </div> -->
              </div>
          </div>
      </div>
        {% endfor %}

        <div class="col-md-4">
            <div class="card h-100 text-center border-primary shadow-sm">
                <div class="card-body d-flex flex-column justify-content-center align-items-center">
                    <h5 class="card-title">Add a New Card</h5>
                    <button class="btn btn-outline-primary mt-3 w-75" data-bs-toggle="modal"
                        data-bs-target="#addCardModal">
                        + Add Card
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addCardModal" tabindex="-1" aria-labelledby="addCardModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <form method="POST" action="{% url 'add_card' %}">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="addCardModalLabel">Add New Card</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <div class="mb-3">
                        <label for="cardName" class="form-label">Card Name</label>
                        <input type="text" name="name" class="form-control" id="cardName" required>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
